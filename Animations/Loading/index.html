<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading</title>
    <style>
        @keyframes loading {
            0% {
                width: 0%;
            }

            9% {
                width: 17%;
            }

            14% {
                width: 20%;
            }

            14% {
                width: 20%;
            }

            18% {
                width: 21%;
            }

            20% {
                width: 21%;
            }

            30% {
                width: 23.5%;
            }

            31% {
                width: 25%;
            }

            40% {
                width: 35%;
            }

            90% {
                width: 36%;
            }

            95% {
                width: 50%;
                opacity: 1;
            }

            100% {
                width: 0%;
                opacity: 0;
            }

        }

        @keyframes loading-text {
            0% {}
        }

        .loading {
            position: absolute;
            top: 400px;
            left: 41%;
            font-size: 60px;
            font-weight: 700;
            font-family: arial;
            text-transform: uppercase;
            animation: loading-text 5s linear;
        }

        .stick {
            position: relative;
            left: 25%;
            top: 500px;
            height: 10px;
            width: 50%;
            border: 3px solid black;
            border-radius: 50px;
            z-index: 0;
        }

        .child {
            position: relative;
            left: 25.2%;
            top: 487px;
            height: 10px;
            width: 0%;
            background-color: red;
            border-radius: 50px;
            z-index: 1;
            animation: loading 5s linear;
        }
    </style>
</head>

<body>
    <div class="loading">Loading</div>
    <div class="stick"></div>
    <div class="child"></div>
</body>

</html>
