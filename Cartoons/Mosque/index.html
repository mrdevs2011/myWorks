<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartoon</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="favicon.png" type="png">
</head>

<body>

    <div class="cartoon">
        <div class="go-to-mosque">
            <div class="splash-heading">Cartoon</div>
            <div class="splash-text-start">Go to mosque child</div>
            <div class="splash-text-general">Making With <span class="css">CSS</span></div>
            <div class="splash-text-end">The end cartoon</div>
            <div class="splash-directed">Directed by <span class="mr">MR</span></div>
        </div>
        <div class="sun">
            <div class="sun-helper"></div>
        </div>
        <div class="moon">
            <div class="moon-helpers1">
                <div class="moon-helper1"></div>
                <div class="moon-helper2"></div>
                <div class="moon-helper3"></div>
                <div class="moon-helper4"></div>
            </div>
            <div class="moon-helpers2">
                <div class="moon-helper1"></div>
                <div class="moon-helper2"></div>
                <div class="moon-helper3"></div>
                <div class="moon-helper4"></div>
            </div>
        </div>
        <div class="road">
            <div class="mosque">
                <div class="zina">
                    <div class="zina1"></div>
                    <div class="zina2"></div>
                    <div class="zina3"></div>
                </div>
                <div class="led-glow">
                    <div class="led"></div>
                </div>
                <div class="door"></div>
                <div class="gumbaz">
                    <div class="moon-mosque"></div>
                    <div class="helper">
                        <div class="st2helper"></div>
                    </div>
                </div>
            </div>

            <div class="child">
                <div class="head">
                    <div class="hair"></div>
                    <div class="sunglass"></div>
                    <div class="sunglass-stick">
                        <div class="sunglass-helper"></div>
                    </div>
                    <div class="heir">
                        <div class="heir-helper">
                            <div class="helper"></div>
                        </div>
                    </div>
                    <div class="nouse"></div>
                    <div class="mouse"></div>
                </div>
                <div class="body">
                    <div class="hand">
                        <div class="watch">
                            <div class="watch-helper">
                                <div class="point"></div>
                            </div>
                        </div>
                        <div class="hand-helper"></div>
                        <div class="hand">
                            <div class="finger1"></div>
                            <div class="finger2"></div>
                            <div class="finger3">
                                <div class="uzuk"></div>
                            </div>
                            <div class="finger4"></div>
                            <div class="finger5"></div>
                        </div>
                    </div>
                    <div class="boyin"></div>
                    <div class="leg-helper"></div>
                    <div class="leg">
                        <div class="sneakers"></div>
                    </div>
                </div>
            </div>
        </div>
</body>

</html>
