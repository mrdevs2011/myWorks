<!DOCTYPE html>
<html lang="uz">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAR</title>
  <link rel="stylesheet" href="./CSS/main.css">
  <link rel="stylesheet" href="./CSS/car.css">
  <link rel="stylesheet" href="./CSS/tree.css">
  <link rel="stylesheet" href="./CSS/animations.css">
  <link rel="stylesheet" href="./CSS/hover.css">
  <link rel="icon" type="image/png" href="./car.png">
</head>

<body>
  <!-- Main container -->
  <div class="road">

    <!-- Root car -->
    <div class="car">

      <!-- Root -->
      <div class="top"></div>
      <div class="bottom"></div>

      <!-- Lamps -->
      <div class="lamp"></div>
      <div class="right-lamp"></div>

      <!-- Door and Mirrors -->
      <div class="door"></div>
      <div class="mirror-left"></div>
      <div class="mirror-center"></div>
      <div class="mirror-right"></div>

      <!-- Small equipments -->
      <div class="door-opener1"></div>
      <div class="door-opener2"></div>
      <div class="smoker"></div>

      <!-- Ballons -->
      <div class="ballons">
        <div class="ballon1in"></div>
        <div class="ballon2in"></div>
        <div class="back-ballon"></div>
      </div>

      <!-- Left ballons -->
      <div class="ballons-left">
        <div class="ballon-stick1"></div>
        <div class="ballon-stick2"></div>
        <div class="ballon-stick3"></div>
        <div class="ballon-stick4"></div>
        <div class="ballon1"></div>
      </div>

      <!-- Right ballons -->
      <div class="ballons-right">
        <div class="ballonstick1"></div>
        <div class="ballonstick2"></div>
        <div class="ballonstick3"></div>
        <div class="ballonstick4"></div>
        <div class="ballon2"></div>
      </div>
    </div>

    <!-- ___________________________________________________________________
     STARTING NATURE THEME
    ____________________________________________________________________ -->

    <!-- Tree -->
    <div class="tree">
      <!-- For tree leafs -->
      <div class="tree1-top"></div>
      <div class="tree2-top"></div>
      <div class="tree3-top"></div>
      <div class="tree4-top"></div>
      <div class="tree5-top"></div>

      <!-- For tree wood -->
      <div class="tree1-bottom"></div>
      <div class="tree2-bottom"></div>
      <div class="tree3-bottom"></div>
      <div class="tree4-bottom"></div>
      <div class="tree5-bottom"></div>
    </div>

    <!-- BUG 1 FIX: ".road-strip" — avval bu div umuman yo'q edi!
         car.css dagi ".road" nomi main.css dagi ".road" ni ustidan
         yozib, butun sahifani top:820px ga siljitib qo'yardi.
         Endi alohida ".road-strip" klassi bilan ajratildi. -->
    <div class="road-strip"></div>

  </div>
</body>

</html>
